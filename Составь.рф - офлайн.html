ion:absolute;top:calc(100% + 4px);left:0;z-index:5;background:#fff;border:1px solid #E4DDD0;border-radius:10px;box-shadow:0 10px 24px -10px rgba(43,38,33,.35);padding:4px;min-width:160px\">\n                          <sc-for list=\"{{ c.teacherOptions }}\" as=\"to\" hint-placeholder-count=\"2\">\n                            <div sc-camel-on-click=\"{{ to.select }}\" style=\"cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;border-radius:8px;padding:7px 10px;color:#2B2621;white-space:nowrap\" style-hover=\"background:#F3E4D9\">{{ to.label }}<\u002Fdiv>\n                          <\u002Fsc-for>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ adding }}\">\n        <div sc-camel-on-click=\"{{ closeAdd }}\" style=\"position:fixed;inset:0;background:rgba(43,38,33,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:12px\">\n          <div sc-camel-on-click=\"{{ stopProp }}\" style=\"background:#fff;border-radius:16px;padding:18px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:4px\">\n              <div style=\"font-weight:700;font-size:15px\">{{ addingTitle }}<\u002Fdiv>\n              <button sc-camel-on-click=\"{{ closeAdd }}\" style=\"border:none;background:transparent;cursor:pointer;color:#6B6459;font-size:18px;font-family:inherit\">✕<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#6B6459;margin-bottom:14px\">{{ addingSubtitle }}<\u002Fdiv>\n\n            <sc-if value=\"{{ addingIsVar }}\">\n              <div style=\"display:grid;gap:12px\">\n                <div style=\"display:flex;gap:8px\">\n                  <button sc-camel-on-click=\"{{ selectTypeSingle }}\" style=\"flex:1;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;border-radius:10px;padding:8px 6px;border:1.5px solid {{ typeSingleBorder }};background:{{ typeSingleBg }};color:{{ typeSingleColor }}\">Обычное<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ selectTypeAlt }}\" style=\"flex:1;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;border-radius:10px;padding:8px 6px;border:1.5px solid {{ typeAltBorder }};background:{{ typeAltBg }};color:{{ typeAltColor }}\">Чередование недель<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:8px\">\n                  <label style=\"flex:1;font-size:12.5px;color:#6B6459\">Начало<input value=\"{{ mStart }}\" sc-camel-on-change=\"{{ onMStartChange }}\" placeholder=\"9.00\" style=\"margin-top:4px;width:100%;border:1px solid #E4DDD0;border-radius:10px;padding:8px 10px;font-family:inherit\"><\u002Flabel>\n                  <label style=\"flex:1;font-size:12.5px;color:#6B6459\">Окончание<input value=\"{{ mEnd }}\" sc-camel-on-change=\"{{ onMEndChange }}\" placeholder=\"9.15\" style=\"margin-top:4px;width:100%;border:1px solid #E4DDD0;border-radius:10px;padding:8px 10px;font-family:inherit\"><\u002Flabel>\n                <\u002Fdiv>\n                <label style=\"font-size:12.5px;color:#6B6459\">{{ subjLabelA }}\n                  <div style=\"margin-top:4px\"><dc-import name=\"CustomSelect\" options=\"{{ varSubjectOptions }}\" value=\"{{ mA }}\" on-change=\"{{ onMAChange }}\" hint-size=\"100%,42px\"><\u002Fdc-import><\u002Fdiv>\n                <\u002Flabel>\n                <label style=\"font-size:12.5px;color:#6B6459\">Педагог\n                  <div style=\"margin-top:4px\"><dc-import name=\"CustomSelect\" options=\"{{ teacherAOptions }}\" value=\"{{ mTeacherA }}\" on-change=\"{{ onMTeacherAChange }}\" placeholder=\"— не назначен —\" hint-size=\"100%,42px\"><\u002Fdc-import><\u002Fdiv>\n                <\u002Flabel>\n                <sc-if value=\"{{ typeIsAlt }}\">\n                  <label style=\"font-size:12.5px;color:#6B6459\">Предмет 2-й недели\n                    <div style=\"margin-top:4px\"><dc-import name=\"CustomSelect\" options=\"{{ varSubjectOptions }}\" value=\"{{ mB }}\" on-change=\"{{ onMBChange }}\" hint-size=\"100%,42px\"><\u002Fdc-import><\u002Fdiv>\n                  <\u002Flabel>\n                  <label style=\"font-size:12.5px;color:#6B6459\">Педагог 2-й недели\n                    <div style=\"margin-top:4px\"><dc-import name=\"CustomSelect\" options=\"{{ teacherBOptions }}\" value=\"{{ mTeacherB }}\" on-change=\"{{ onMTeacherBChange }}\" placeholder=\"— тот же —\" hint-size=\"100%,42px\"><\u002Fdc-import><\u002Fdiv>\n                  <\u002Flabel>\n                <\u002Fsc-if>\n                <button sc-camel-on-click=\"{{ saveAdd }}\" style=\"background:#C1652E;color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">Добавить в {{ addingDayShort }}<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ addingIsInv }}\">\n              <div style=\"display:grid;gap:12px\">\n                <label style=\"font-size:12.5px;color:#6B6459\">Занятие\n                  <div style=\"margin-top:4px\"><dc-import name=\"CustomSelect\" options=\"{{ invSubjectOptions }}\" value=\"{{ mInvSubject }}\" on-change=\"{{ onMInvSubjectChange }}\" hint-size=\"100%,42px\"><\u002Fdc-import><\u002Fdiv>\n                <\u002Flabel>\n                <label style=\"font-size:12.5px;color:#6B6459\">Педагог (необязательно)\n                  <div style=\"margin-top:4px\"><dc-import name=\"CustomSelect\" options=\"{{ teacherInvOptions }}\" value=\"{{ mInvTeacher }}\" on-change=\"{{ onMInvTeacherChange }}\" placeholder=\"— воспитатель группы —\" hint-size=\"100%,42px\"><\u002Fdc-import><\u002Fdiv>\n                <\u002Flabel>\n                <button sc-camel-on-click=\"{{ saveAdd }}\" style=\"background:#C1652E;color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">Добавить в {{ addingDayShort }}<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"teachers\" style=\"max-width:1180px;margin:0 auto;padding:clamp(48px,7vw,80px) 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:48px\">\n  <div>\n    <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:clamp(26px,3vw,34px);margin:0 0 18px\">Для педагогов, а не вместо них<\u002Fh2>\n    <p style=\"font-size:15.5px;color:#6B6459;margin:0 0 18px\">Конструктор не принимает методических решений — их принимаете вы. Он только держит расписание в порядке и избавляет от ручной сверки.<\u002Fp>\n    <div style=\"display:grid;gap:12px;font-size:14.5px\">\n      <div>— Все данные хранятся в вашем браузере, ничего не отправляется на сторонние серверы.<\u002Fdiv>\n      <div>— У каждого педагога — личное расписание в Word одним кликом, без набора вручную.<\u002Fdiv>\n      <div>— Сервис не допустит двойной записи одного педагога на одно время.<\u002Fdiv>\n      <div>— Работает на телефоне, планшете и компьютере — расписание под рукой в кабинете и дома.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#fff;border:1px solid #E4DDD0;border-radius:18px;padding:26px\">\n    <div style=\"font-family:'Newsreader',serif;font-size:18px;line-height:1.5;color:#2B2621\">«Расписание для всех групп детского сада на неделю — теперь вечер работы вместо двух дней в Excel.»<\u002Fdiv>\n    <div style=\"font-size:13px;color:#6B6459;margin-top:16px\">Старший воспитатель, детский сад<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"faq\" style=\"max-width:840px;margin:0 auto;padding:clamp(48px,7vw,80px) 24px\">\n  <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:clamp(26px,3vw,34px);margin:0 0 28px\">Частые вопросы<\u002Fh2>\n  <div style=\"display:grid;gap:10px\">\n    <details style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px 18px\">\n      <summary style=\"cursor:pointer;font-weight:700;font-size:15.5px\">Как составить расписание занятий в детском саду онлайн?<\u002Fsummary>\n      <p style=\"font-size:14.5px;color:#6B6459;margin:10px 0 0\">В Составь.рф вы вносите группы, предметы и педагогов, затем расставляете занятия по дням недели — конструктор сам проверит пересечения педагогов и нормы часов и покажет расписание для каждой группы.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px 18px\">\n      <summary style=\"cursor:pointer;font-weight:700;font-size:15.5px\">Учитывает ли конструктор региональные требования к расписанию?<\u002Fsummary>\n      <p style=\"font-size:14.5px;color:#6B6459;margin:10px 0 0\">Да. Вы задаёте свои нормы часов в неделю, время окончания вариативных занятий и правила по педагогам — под требования своего региона и учреждения, а сервис контролирует их выполнение.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px 18px\">\n      <summary style=\"cursor:pointer;font-weight:700;font-size:15.5px\">Можно ли выгрузить расписание в Word для каждого педагога?<\u002Fsummary>\n      <p style=\"font-size:14.5px;color:#6B6459;margin:10px 0 0\">Да, во вкладке «Педагоги» одной кнопкой выгружается персональный файл .doc с расписанием конкретного педагога по всем группам, в которых он занят.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px 18px\">\n      <summary style=\"cursor:pointer;font-weight:700;font-size:15.5px\">Проверяет ли сервис пересечения педагогов между группами?<\u002Fsummary>\n      <p style=\"font-size:14.5px;color:#6B6459;margin:10px 0 0\">Да, автоматически. Если один педагог назначен в двух группах на одно и то же время, конструктор покажет ошибку с указанием групп, дня и времени.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px 18px\">\n      <summary style=\"cursor:pointer;font-weight:700;font-size:15.5px\">Где хранятся данные расписания — это безопасно?<\u002Fsummary>\n      <p style=\"font-size:14.5px;color:#6B6459;margin:10px 0 0\">Все данные хранятся локально в браузере устройства и никуда не отправляются — это касается расписания, педагогов и групп.<\u002Fp>\n    <\u002Fdetails>\n    <details style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px 18px\">\n      <summary style=\"cursor:pointer;font-weight:700;font-size:15.5px\">Это бесплатно?<\u002Fsummary>\n      <p style=\"font-size:14.5px;color:#6B6459;margin:10px 0 0\">Конструктор можно попробовать бесплатно прямо на этой странице — без регистрации.<\u002Fp>\n    <\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<footer style=\"border-top:1px solid #E4DDD0;background:#FFFFFF\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:40px 24px;display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap\">\n    <div>\n      <div style=\"font-family:'Newsreader',serif;font-weight:600;font-size:19px\">Составь.рф<\u002Fdiv>\n      <div style=\"font-size:13px;color:#6B6459;margin-top:6px;max-width:32ch\">Конструктор расписания занятий для детских садов и школ.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:13.5px;color:#6B6459\">© 2026 Составь.рф<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { ready: false };\n\n  componentDidMount() {\n    this._onMouseMove = (e) => { this.lastMouseX = e.clientX; this.lastMouseY = e.clientY; };\n    document.addEventListener('mousemove', this._onMouseMove);\n    this.history = []; this.redoStack = [];\n    this._onKeyDown = (e) => {\n      const mod = e.ctrlKey || e.metaKey;\n      if (!mod) return;\n      if (e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); this.undo(); }\n      else if (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey)) { e.preventDefault(); this.redo(); }\n    };\n    document.addEventListener('keydown', this._onKeyDown);\n    // mobile: after the on-screen keyboard closes, some browsers keep a stale hit-testing\n    // offset (dead zone where the keyboard was, touches registering lower). A scroll nudge\n    // forces the browser to re-sync the visual viewport with the layout viewport.\n    if (window.visualViewport) {\n      this._vvH = window.visualViewport.height;\n      this._onVV = () => {\n        const h = window.visualViewport.height;\n        if (h > this._vvH + 80) {\n          setTimeout(() => this.fixViewportDeadZone(), 60);\n          setTimeout(() => this.fixViewportDeadZone(), 350);\n        }\n        this._vvH = h;\n      };\n      window.visualViewport.addEventListener('resize', this._onVV);\n    }\n    import(window.__resources && (window.__resources['./schedule-logic.js'] || window.__resources.scheduleLogic) || './schedule-logic.js?v=' + Date.now()).then((mod) => {\n      this.mod = mod;\n      let data;\n      try {\n        const raw = localStorage.getItem('sostav-schedule-v1');\n        data = raw ? JSON.parse(raw) : mod.emptyData();\n      } catch (e) { data = mod.emptyData(); }\n      if (!data.ageOptions) data.ageOptions = [...mod.DEFAULT_AGE_OPTIONS];\n      if (!data.settings) data.settings = {};\n      if (!data.settings.timing) data.settings.timing = { start: '9.00', lesson: 25, break: 10, end: '11.00' };\n      if (!data.timings) data.timings = [];\n      this.setState({\n        ready: true, data, tab: 'subjects', week: 'A',\n        scheduleGid: data.groups[0]?.id || '', normsGid: data.groups[0]?.id || '', adding: null,\n        mType: 'single', mA: '', mB: '', mStart: '9.00', mEnd: '9.15', mTeacherA: '', mTeacherB: '',\n        mInvSubject: '', mInvTeacher: '',\n        newSubjectName: '', newTeacherName: '',\n        newGroupName: '', newGroupAge: '',\n        normType: 'single', normA: '', normB: '', normPer: 1,\n      }, () => { setTimeout(() => this.centerActiveTab(), 60); });\n    });\n  }\n\n  componentWillUnmount() {\n    if (this._onMouseMove) document.removeEventListener('mousemove', this._onMouseMove);\n    if (this._onKeyDown) document.removeEventListener('keydown', this._onKeyDown);\n  }\n\n  undo() {\n    if (!this.history || !this.history.length) return;\n    const prev = this.history.pop();\n    this.redoStack.push(JSON.parse(JSON.stringify(this.state.data)));\n    if (this.redoStack.length > 5) this.redoStack.shift();\n    this.setState({ data: prev }, () => this.scheduleSave());\n  }\n\n  redo() {\n    if (!this.redoStack || !this.redoStack.length) return;\n    const next = this.redoStack.pop();\n    this.history.push(JSON.parse(JSON.stringify(this.state.data)));\n    if (this.history.length > 5) this.history.shift();\n    this.setState({ data: next }, () => this.scheduleSave());\n  }\n\n  recheckHoverAtLastMouse() {\n    if (this.lastMouseX == null) return;\n    const el = document.elementFromPoint(this.lastMouseX, this.lastMouseY);\n    if (!el) { this.setState({ hoverSubjectId: null, hoverDeleteSubjectId: null }); return; }\n    const delEl = el.closest('[data-subjdel]');\n    const chipEl = el.closest('[data-subj]');\n    if (delEl) this.setState({ hoverDeleteSubjectId: delEl.getAttribute('data-subjdel'), hoverSubjectId: chipEl ? chipEl.getAttribute('data-subj') : null });\n    else if (chipEl) this.setState({ hoverSubjectId: chipEl.getAttribute('data-subj'), hoverDeleteSubjectId: null });\n    else this.setState({ hoverSubjectId: null, hoverDeleteSubjectId: null });\n  }\n\n  pickImportFile(accept, cb) {\n    const inp = document.createElement('input');\n    inp.type = 'file'; inp.accept = accept;\n    inp.onchange = () => {\n      const f = inp.files && inp.files[0]; if (!f) return;\n      const r = new FileReader();\n      r.onload = () => cb(String(r.result));\n      r.readAsText(f);\n    };\n    inp.click();\n  }\n\n  applyImportedData(d) {\n    if (!d.norms) d.norms = {}; if (!d.schedule) d.schedule = {}; if (!d.ageOptions) d.ageOptions = []; if (!d.timings) d.timings = [];\n    this.upd((prev) => { Object.keys(prev).forEach((k) => delete prev[k]); Object.assign(prev, d); });\n    this.setState({ scheduleIoMode: null, resetModalOpen: false });\n  }\n\n  scheduleSave() {\n    clearTimeout(this._t);\n    this._t = setTimeout(() => { try { localStorage.setItem('sostav-schedule-v1', JSON.stringify(this.state.data)); } catch (e) {} }, 500);\n  }\n\n  upd(fn) {\n    if (this.history) {\n      this.history.push(JSON.parse(JSON.stringify(this.state.data)));\n      if (this.history.length > 5) this.history.shift();\n      this.redoStack = [];\n    }\n    const copy = JSON.parse(JSON.stringify(this.state.data));\n    fn(copy);\n    this.setState({ data: copy }, () => this.scheduleSave());\n  }\n\n  subj(id) { return this.state.data.subjects.find((s) => s.id === id); }\n  tch(id) { return this.state.data.teachers.find((t) => t.id === id); }\n  grp(id) { return this.state.data.groups.find((g) => g.id === id); }\n\n  renderVals() {\n    if (!this.state.ready) return { ready: false };\n    const mod = this.mod;\n    const data = this.state.data;\n    const subj = (id) => this.subj(id);\n    const tch = (id) => this.tch(id);\n    const setField = (f) => (e) => this.setState({ [f]: e.target.value });\n    const setFieldVal = (f) => (v) => this.setState({ [f]: v });\n\n    const issues = mod.computeIssues(data);\n    const errors = issues.filter((i) => i.level === 'error');\n    const warns = issues.filter((i) => i.level === 'warn');\n    const badgeCount = errors.length + warns.length;\n\n    const tabDefs = [\n      ['subjects', 'Предметы'], ['teachers', 'Педагоги'], ['groups', 'Группы'],\n      ['norms', 'Кол-во занятий'], ['timing', 'Время занятий'], ['schedule', 'Расписание'], ['checks', 'Проверки'],\n    ];\n    const tabs = tabDefs.map(([id, label]) => ({\n      id, label, active: this.state.tab === id, activeFalse: this.state.tab !== id,\n      stateCls: this.state.tab === id ? 'is-active' : 'is-inactive',\n      icon: this.tabIcon(id),\n      badge: id === 'checks' ? badgeCount : 0, showBadge: id === 'checks' && badgeCount > 0,\n      select: () => this.setState({ tab: id }, () => {\n        requestAnimationFrame(() => requestAnimationFrame(() => this.centerActiveTab()));\n        setTimeout(() => this.centerActiveTab(), 200);\n      }),\n    }));\n\n    const groupOptions = data.groups.map((g) => ({ id: g.id, label: `Группа ${g.name} · ${g.age}` }));\n\n    // ---- Schedule tab ----\n    const week = this.state.week;\n    const gid = this.state.scheduleGid;\n    const sched = data.schedule[gid] || { lessons: [], invariants: [] };\n    const errText = errors.map((e) => e.text).join('\\n');\n    const g = this.grp(gid);\n    const teacherHasConflict = (teacherName, dayName) => teacherName && errText.includes(teacherName) && errText.includes(dayName) && errText.includes(`группа ${g?.name}`);\n\n    const scheduleDays = mod.DAYS.map((name, day) => {\n      const lessons = (sched.lessons || []).filter((l) => l.day === day)\n        .sort((x, y) => (mod.parseTime(x.start) ?? 9999) - (mod.parseTime(y.start) ?? 9999))\n        .map((l) => {\n          const isAlt = l.type === 'alt';\n          const showSubj = isAlt ? (week === 'A' ? subj(l.a) : subj(l.b)) : subj(l.a);\n          const showTeacher = isAlt ? tch(week === 'A' ? l.teacherA : (l.teacherB || l.teacherA)) : tch(l.teacherA);\n          const bad = teacherHasConflict(showTeacher?.name, mod.DAYS[day]);\n          return {\n            id: l.id, timeLabel: mod.fmtRange(l),\n            chipLabel: isAlt ? `⇄ ${show ind) {\n    const mod = this.mod;\n    this.upd((d) => {\n      if (!d.norms[gid]) d.norms[gid] = [];\n      const n = d.norms[gid].find((x) => x.type === 'single' && x.a === sid);\n      if (n) { n.kind = kind; n.extra = kind === 'extra'; }\n      else d.norms[gid].push({ id: mod.uid(), type: 'single', a: sid, perWeek: 1, kind, extra: kind === 'extra' });\n    });\n  }\n\n  // Enter in a time field → jump to the next time field (start → end → next row)\n  focusNextTime(key, i, field) {\n    const blocks = this.state.newTimingBlocks || this.defaultBlocks();\n    const order = [];\n    ['all', 'main', 'extra', 'other', 'banned'].forEach((k) => (blocks[k] || []).forEach((_, j) => { order.push(`${k}:${j}:s`, `${k}:${j}:e`, `${k}:${j}:m`); }));\n    const cur = `${key}:${i}:${field}`;\n    const next = order[order.indexOf(cur) + 1];\n    const inputs = this.timeInputs || {};\n    if (next && inputs[next]) { inputs[next].focus(); if (inputs[next].select) inputs[next].select(); }\n    else if (inputs[cur]) inputs[cur].blur();\n  }\n\n  defaultBlocks() {\n    return { all: [], main: [{ start: '9.00', end: '11.00' }], extra: [], other: [], banned: [] };\n  }\n\n  updTimingBlockList(key, fn) {\n    this.setState((s) => {\n      const cur = s.newTimingBlocks || this.defaultBlocks();\n      return { newTimingBlocks: { ...cur, [key]: fn(cur[key] || []) }, timingFormOpen: true };\n    });\n  }\n\n  updTimingBlock(key, i, field, val) {\n    this.updTimingBlockList(key, (list) => list.map((w, j) => (j === i ? { ...w, [field]: val } : w)));\n  }\n\n  timingSummary(tm) {\n    const b = tm.blocks || { main: tm.start ? [{ start: tm.start, end: tm.end }] : [], extra: tm.eveStart && tm.eveEnd ? [{ start: tm.eveStart, end: tm.eveEnd }] : [], other: [], banned: [] };\n    const fmt = (list) => (list || []).filter((w) => w.start && w.end).map((w) => `${w.start}–${w.end}` + (w.max ? ` (до ${w.max})` : '')).join(', ');\n    const parts = [`занятие ${tm.lesson} мин`, `перерыв ${tm.break} мин`];\n    if (fmt(b.main)) parts.push(`занятия ${fmt(b.main)}`);\n    if (fmt(b.extra)) parts.push(`доп. ${fmt(b.extra)}`);\n    if (fmt(b.other)) parts.push(`иные ${fmt(b.other)}`);\n    if (fmt(b.banned)) parts.push(`нельзя ${fmt(b.banned)}`);\n    return parts.join(', ');\n  }\n\n  resetTimingForm() {\n    if (this.deferForKeyboard(() => this.resetTimingForm())) return;\n    this.setState({ editingTimingId: null, timingFormOpen: false, newTimingName: '', newTimingLesson: 25, newTimingBreak: 10, newTimingBlocks: this.defaultBlocks(), newTimingGroupIds: [] });\n  }\n\n  submitTiming() {\n    const st = this.state;\n    const name = (st.newTimingName || '').trim();\n    if (!name) { const el = this.timingNameInput; if (el) el.focus(); this.setState({ timingFormOpen: true }); return; }\n    if (this.deferForKeyboard(() => this.submitTiming())) return;\n    this.blurActive();\n    const raw = st.newTimingBlocks || this.defaultBlocks();\n    const clean = (list) => (list || []).map((w) => ({ start: (w.start || '').trim(), end: (w.end || '').trim(), max: (w.max || '').trim() })).filter((w) => w.start || w.end);\n    const payload = {\n      name, lesson: Math.max(5, Math.min(120, +st.newTimingLesson || 25)), break: Math.max(0, Math.min(120, st.newTimingBreak === '' || st.newTimingBreak == null ? 10 : +st.newTimingBreak || 0)),\n      blocks: { all: clean(raw.all), main: clean(raw.main), extra: clean(raw.extra), other: clean(raw.other), banned: clean(raw.banned) },\n      groupIds: [...(st.newTimingGroupIds || [])],\n    };\n    this.upd((d) => {\n      if (!d.timings) d.timings = [];\n      if (st.editingTimingId) {\n        const tm = d.timings.find((x) => x.id === st.editingTimingId);\n        if (tm) { delete tm.start; delete tm.end; delete tm.eveStart; delete tm.eveEnd; Object.assign(tm, payload); }\n      } else {\n        d.timings.push({ id: 'tm' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), ...payload });\n      }\n    });\n    this.resetTimingForm();\n  }\n\n  startEditSubject(s) {\n    this.setState({ editingSubjectId: s.id, newSubjectName: s.name, hoverSubjectId: null, hoverDeleteSubjectId: null }, () => {\n      if (this.subjectInputEl) { this.subjectInputEl.focus(); const len = this.subjectInputEl.value.length; this.subjectInputEl.setSelectionRange(len, len); }\n    });\n  }\n\n  // If the on-screen keyboard is open, blur first, wait for the keyboard to actually close\n  // (visualViewport grows back), then re-run the action. Returns true when deferred.\n  deferForKeyboard(retry) {\n    const el = document.activeElement;\n    const focused = el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT');\n    if (!focused || !('ontouchstart' in window)) return false;\n    el.blur();\n    let done = false;\n    const go = () => { if (done) return; done = true; retry(); setTimeout(() => this.fixViewportDeadZone(), 60); };\n    const vv = window.visualViewport;\n    if (vv) {\n      const h0 = vv.height;\n      const onR = () => { if (vv.height > h0 + 40) { vv.removeEventListener('resize', onR); setTimeout(go, 80); } };\n      vv.addEventListener('resize', onR);\n      setTimeout(() => { vv.removeEventListener('resize', onR); go(); }, 600);\n    } else setTimeout(go, 300);\n    return true;\n  }\n\n  blurActive() {\n    const el = document.activeElement;\n    if (el && typeof el.blur === 'function' && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT')) el.blur();\n    setTimeout(() => this.fixViewportDeadZone(), 250);\n  }\n\n  fixViewportDeadZone() {\n    // re-sync the system IME state: a readonly input focus/blur cycle tells the OS\n    // the keyboard session is truly over (readonly = keyboard does not re-open)\n    try {\n      const tmp = document.createElement('input');\n      tmp.readOnly = true;\n      tmp.style.cssText = 'position:fixed;top:0;left:0;opacity:0;height:1px;width:1px;border:0;padding:0;pointer-events:none';\n      document.body.appendChild(tmp);\n      tmp.focus({ preventScroll: true });\n      tmp.blur();\n      document.body.removeChild(tmp);\n    } catch (e) {}\n    // force full re-layout + hit-test re-sync after the on-screen keyboard hides\n    const y = window.scrollY;\n    const de = document.documentElement;\n    // overflow toggle: hard-resets a stuck visual viewport (iOS/Android webviews)\n    de.style.overflow = 'hidden';\n    void de.offsetHeight;\n    de.style.overflow = '';\n    void de.offsetHeight;\n    // if the visual viewport is still detached from the layout scroll, re-align them\n    const vv = window.visualViewport;\n    if (vv && Math.abs(vv.pageTop - window.scrollY) > 2) {\n      window.scrollTo(window.scrollX, Math.max(0, Math.round(vv.pageTop)));\n    } else {\n      window.scrollTo(window.scrollX, y + 1);\n      window.scrollTo(window.scrollX, Math.max(0, y - 1));\n      window.scrollTo(window.scrollX, y);\n    }\n  }\n\n  submitSubjectForm() {\n    const n = this.state.newSubjectName.trim();\n    if (!n) return;\n    if (this.deferForKeyboard(() => this.submitSubjectForm())) return;\n    this.blurActive();\n    const mod = this.mod;\n    if (this.state.editingSubjectId) {\n      const id = this.state.editingSubjectId;\n      this.upd((d) => { const s = d.subjects.find((x) => x.id === id); if (s) s.name = n; });\n      this.setState({ editingSubjectId: null, newSubjectName: '' });\n    } else {\n      this.upd((d) => d.subjects.push({ id: mod.uid(), name: n, color: mod.SUBJECT_COLORS[d.subjects.length % mod.SUBJECT_COLORS.length] }));\n      this.setState({ newSubjectName: '' });\n    }\n  }\n\n  startEditGroup(gr) {\n    this.setState({ editingGroupId: gr.id, newGroupName: gr.name, newGroupAge: gr.age, newGroupSubjectIds: [...(gr.subjectIds || [])], newGroupSubjectTeachers: { ...(gr.subjectTeachers || {}) } }, () => {\n      if (this.groupNameInputEl) { this.groupNameInputEl.focus(); const len = this.groupNameInputEl.value.length; this.groupNameInputEl.setSelectionRange(len, len); }\n    });\n  }\n\n  submitGroupForm() {\n    const n = this.state.newGroupName.trim();\n    if (!n) return;\n    if (this.deferForKeyboard(() => this.submitGroupForm())) return;\n    this.blurActive();\n    const mod = this.mod;\n    const subjectIds = [...(this.state.newGroupSubjectIds || [])];\n    const subjectTeachers = { ...(this.state.newGroupSubjectTeachers || {}) };\n    if (this.state.editingGroupId) {\n      const id = this.state.editingGroupId;\n      const age = this.state.newGroupAge;\n      this.upd((d) => { const g = d.groups.find((x) => x.id === id); if (g) { g.name = n; g.age = age; g.subjectIds = subjectIds; g.subjectTeachers = subjectTeachers; } });\n      this.setState({ editingGroupId: null, newGroupName: '', newGroupAge: '', newGroupSubjectIds: [], newGroupSubjectTeachers: {} });\n    } else {\n      this.upd((d) => d.groups.push({ id: mod.uid(), name: n, age: this.state.newGroupAge, subjectIds, subjectTeachers }));\n      this.setState({ newGroupName: '', newGroupSubjectIds: [], newGroupSubjectTeachers: {} });\n    }\n  }\n\n  startEditTeacher(t) {\n    this.setState({ editingTeacherId: t.id, newTeacherName: t.name, newTeacherSubjectIds: [...t.subjectIds], newTeacherWorkHours: { ...(t.workHours || {}) } }, () => {\n      if (this.teacherNameInputEl) { this.teacherNameInputEl.focus(); const len = this.teacherNameInputEl.value.length; this.teacherNameInputEl.setSelectionRange(len, len); }\n    });\n  }\n\n  submitTeacherForm() {\n    const n = this.state.newTeacherName.trim();\n    if (!n) return;\n    if (this.deferForKeyboard(() => this.submitTeacherForm())) return;\n    this.blurActive();\n    const mod = this.mod;\n    const subjectIds = [...(this.state.newTeacherSubjectIds || [])];\n    const workHours = { ...(this.state.newTeacherWorkHours || {}) };\n    if (this.state.editingTeacherId) {\n      const id = this.state.editingTeacherId;\n      this.upd((d) => { const t = d.teachers.find((x) => x.id === id); if (t) { t.name = n; t.subjectIds = subjectIds; t.workHours = workHours; } });\n      this.setState({ editingTeacherId: null, newTeacherName: '', newTeacherSubjectIds: [], newTeacherWorkHours: {} });\n    } else {\n      this.upd((d) => d.teachers.push({ id: mod.uid(), name: n, subjectIds, workHours, onePerDay: false }));\n      this.setState({ newTeacherName: '', newTeacherSubjectIds: [], newTeacherWorkHours: {} });\n    }\n  }\n\n  openAdd(day, mode) {\n    const data = this.state.data;\n    this.setState({\n      adding: { day, mode }, mType: 'single', mA: data.subjects[0]?.id || '', mB: data.subjects[1]?.id || '',\n      mStart: '9.00', mEnd: '9.15', mTeacherA: '', mTeacherB: '',\n      mInvSubject: data.subjects[0]?.id || '', mInvTeacher: '',\n    });\n  }\n\n  saveAdd() {\n    const { adding, scheduleGid: gid } = this.state;\n    if (!adding) return;\n    const mod = this.mod;\n    if (adding.mode === 'var') {\n      const { mType, mA, mB, mStart, mEnd, mTeacherA, mTeacherB } = this.state;\n      if (mod.parseTime(mStart) == null || mod.parseTime(mEnd) == null) { alert('Время в формате 9.00 или 09:00'); return; }\n      if (mType === 'alt' && mA === mB) { alert('В чередовании выберите два разных предмета'); return; }\n      this.upd((d) => {\n        if (!d.schedule[gid]) d.schedule[gid] = { lessons: [], invariants: [] };\n        if (!d.schedule[gid].lessons) d.schedule[gid].lessons = [];\n        d.schedule[gid].lessons.push({ id: mod.uid(), day: adding.day, type: mType, a: mA, b: mType === 'alt' ? mB : undefined, start: mStart.trim(), end: mEnd.trim(), teacherA: mTeacherA, teacherB: mType === 'alt' ? mTeacherB : undefined });\n      });\n    } else {\n      const { mInvSubject, mInvTeacher } = this.state;\n      this.upd((d) => {\n        if (!d.schedule[gid]) d.schedule[gid] = { lessons: [], invariants: [] };\n        if (!d.schedule[gid].invariants) d.schedule[gid].invariants = [];\n        d.schedule[gid].invariants.push({ id: mod.uid(), day: adding.day, subjectId: mInvSubject, teacherId: mInvTeacher });\n      });\n    }\n    this.setState({ adding: null });\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
