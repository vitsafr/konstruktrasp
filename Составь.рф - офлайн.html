document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

chema.org\",\"@type\":\"FAQPage\",\"mainEntity\":[\n{\"@type\":\"Question\",\"name\":\"Как составить расписание занятий в детском саду онлайн?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"В Составь.рф вы вносите группы, предметы и педагогов, затем расставляете занятия по дням недели — конструктор сам проверит пересечения педагогов и нормы часов и покажет расписание для каждой группы.\"}},\n{\"@type\":\"Question\",\"name\":\"Учитывает ли конструктор региональные требования к расписанию?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Да. Вы задаёте свои нормы часов в неделю, время окончания вариативных занятий и правила по педагогам — под требования своего региона и учреждения, а сервис контролирует их выполнение.\"}},\n{\"@type\":\"Question\",\"name\":\"Можно ли выгрузить расписание в Word для каждого педагога?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Да, во вкладке «Педагоги» одной кнопкой выгружается персональный файл .doc с расписанием конкретного педагога по всем группам, в которых он занят.\"}},\n{\"@type\":\"Question\",\"name\":\"Проверяет ли сервис пересечения педагогов между группами?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Да, автоматически. Если один педагог назначен в двух группах на одно и то же время, конструктор покажет ошибку с указанием групп, дня и времени.\"}},\n{\"@type\":\"Question\",\"name\":\"Где хранятся данные расписания — это безопасно?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Все данные хранятся локально в браузере устройства и никуда не отправляются — это касается расписания, педагогов и групп.\"}},\n{\"@type\":\"Question\",\"name\":\"Это бесплатно?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Конструктор можно попробовать бесплатно прямо на этой странице — без регистрации.\"}}\n]}\n<\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n  a { color: #C1652E; text-decoration: none; }\n  a:hover { color: #A6531F; }\n  ::-webkit-scrollbar { height: 8px; iv sc-camel-on-click=\"{{ closeBurger }}\" class=\"burger-overlay\" style=\"position:fixed;inset:0;z-index:50;background:rgba(247,244,238,.6);backdrop-filter:blur(10px)\">\n        <button sc-camel-on-click=\"{{ closeBurger }}\" aria-label=\"Закрыть меню\" class=\"burger-btn open burger-close\" style=\"position:fixed;z-index:2;border:1px solid #E4DDD0;background:#fff;color:#2B2621;border-radius:10px;width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;flex:none;cursor:pointer;box-shadow:0 8px 20px -8px rgba(43,38,33,.35)\">\n          <span class=\"burger-ico\"><span><\u002Fspan><\u002Fspan>\n        <\u002Fbutton>\n        <nav sc-camel-on-click=\"{{ stopClick }}\" class=\"burger-panel\" style=\"position:fixed;background:#F7F4EE;border:1.5px solid #C1652E55;border-radius:16px;padding:18px 14px;box-shadow:0 24px 48px -20px rgba(43,38,33,.35);gap:2px\">\n          <a href=\"#features\" sc-camel-on-click=\"{{ closeBurger }}\" style=\"color:#2B2621;font-weight:600;font-size:16px;padding:13px 16px;border-radius:10px\" style-hover=\"background:#F0EBE1\">Возможности<\u002Fa>\n          <a href=\"#how\" sc-camel-on-click=\"{{ closeBurger }}\" style=\"color:#2B2621;font-weight:600;font-size:16px;padding:13px 16px;border-radius:10px\" style-hover=\"background:#F0EBE1\">Как это работает<\u002Fa>\n          <a href=\"#tool\" sc-camel-on-click=\"{{ closeBurger }}\" style=\"color:#2B2621;font-weight:600;font-size:16px;padding:13px 16px;border-radius:10px\" style-hover=\"background:#F0EBE1\">Конструктор<\u002Fa>\n          <a href=\"#teachers\" sc-camel-on-click=\"{{ closeBurger }}\" style=\"color:#2B2621;font-weight:600;font-size:16px;padding:13px 16px;border-radius:10px\" style-hover=\"background:#F0EBE1\">Для педагогов<\u002Fa>\n          <a href=\"#faq\" sc-camel-on-click=\"{{ closeBurger }}\" style=\"color:#2B2621;font-weight:600;font-size:16px;padding:13px 16px;border-radius:10px\" style-hover=\"background:#F0EBE1\">FAQ<\u002Fa>\n        <\u002Fnav>\n    <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ scheduleIoModalOpen }}\">\n    <div sc-camel-on-click=\"{{ closeScheduleIo }}\" class=\"burger-overlay\" style=\"position:fixed;inset:0;z-index:3000;background:rgba(247,244,238,.6);backdrop-filter:blur(10px);display:grid;place-items:center;padding:24px\">\n        <div sc-camel-on-click=\"{{ stopClick }}\" class=\"reset-panel\" style=\"position:relative;background:#F7F4EE;border:1.5px solid #C1652E55;border-radius:16px;padding:34px 28px 26px;box-shadow:0 24px 48px -20px rgba(43,38,33,.35);width:100%;max-width:380px;text-align:center;animation:burgerPop .22s cubic-bezier(.2,.9,.3,1.2);transform-origin:center\">\n            <button sc-camel-on-click=\"{{ closeScheduleIo }}\" aria-label=\"Закрыть\" class=\"burger-btn open\" style=\"position:absolute;top:-16px;right:-16px;z-index:2;border:1px solid #E4DDD0;background:#fff;color:#2B2621;width:38px;height:38px;border-radius:12px;cursor:pointer;padding:0;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -6px rgba(43,38,33,.3)\">\n              <span class=\"burger-ico\"><span><\u002Fspan><\u002Fspan>\n            <\u002Fbutton>\n            <div style=\"font-weight:700;font-size:18px;color:#2B2621;margin-bottom:8px\">{{ scheduleIoTitle }}<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#6B6459;margin-bottom:22px\">{{ scheduleIoSubtitle }}<\u002Fdiv>\n            <div style=\"display:grid;gap:10px\">\n              <button sc-camel-on-click=\"{{ scheduleIoWord }}\" style=\"background:#fff;border:1px solid #E4DDD0;color:#2B2621;border-radius:12px;padding:13px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:12px;text-align:left\" style-hover=\"border-color:#C1652E59;background:#F3E4D9\">\n                <span style=\"width:34px;height:34px;border-radius:9px;background:#EAEFE4;color:#6B7F5E;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:800\">.doc<\u002Fspan>\n                <span><span style=\"display:block\">Word<\u002Fspan><span style=\"display:block;font-size:12px;color:#6B6459;font-weight:500\">{{ scheduleIoWordHint }}<\u002Fspan><\u002Fspan>\n              <\u002Fbutton>\n              <button sc-camel-on-click=\"{{ scheduleIoJson }}\" style=\"background:#fff;border:1px solid #E4DDD0;color:#2B2621;border-radius:12px;padding:13px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:12px;text-align:left\" style-hover=\"border-color:#C1652E59;background:#F3E4D9\">\n                <span style=\"width:34px;height:34px;border-radius:9px;background:#F3E4D9;color:#A6531F;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800\">json<\u002Fspan>\n                <span><span style=\"display:block\">JSON<\u002Fspan><span style=\"display:block;font-size:12px;color:#6B6459;font-weight:500\">{{ scheduleIoJsonHint }}<\u002Fspan><\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fdiv>\n        <\u002Fdiv>\n    <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ resetModalOpen }}\">\n    <div sc-camel-on-click=\"{{ closeResetModal }}\" class=\"burger-overlay\" style=\"position:fixed;inset:0;z-index:3000;background:rgba(247,244,238,.6);backdrop-filter:blur(10px);display:grid;place-items:center;padding:24px\">\n        <div sc-camel-on-click=\"{{ stopClick }}\" class=\"reset-panel\" style=\"position:relative;background:#F7F4EE;border:1.5px solid #C1652E55;border-radius:16px;padding:34px 28px 26px;box-shadow:0 24px 48px -20px rgba(43,38,33,.35);width:100%;max-width:380px;text-align:center;animation:burgerPop .22s cubic-bezier(.2,.9,.3,1.2);transform-origin:center\">\n            <button sc-camel-on-click=\"{{ closeResetModal }}\" aria-label=\"Закрыть\" class=\"burger-btn open\" style=\"position:absolute;top:-16px;right:-16px;z-index:2;border:1px solid #E4DDD0;background:#fff;color:#2B2621;width:38px;height:38px;border-radius:12px;cursor:pointer;padding:0;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -6px rgba(43,38,33,.3)\">\n              <span class=\"burger-ico\"><span><\u002Fspan><\u002Fspan>\n            <\u002Fbutton>\n            <div style=\"font-weight:700;font-size:18px;color:#2B2621;margin-bottom:8px\">Сбросить данные во всех вкладках?<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#6B6459;margin-bottom:22px\">Предметы, педагоги, группы, время занятий и расписание будут удалены. Отменить действие можно через Ctrl+Z.<\u002Fdiv>\n            <div style=\"display:flex;gap:10px;justify-content:center\">\n              <button sc-camel-on-click=\"{{ confirmReset }}\" style=\"background:#B3432E;border:none;color:#fff;border-radius:10px;padding:11px 26px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">Да<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ closeResetModal }}\" style=\"background:#fff;border:1px solid #E4DDD0;color:#2B2621;border-radius:10px;padding:11px 26px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">Нет<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid #E4DDD0;margin-top:22px;padding-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap\">\n              <button sc-camel-on-click=\"{{ exportData }}\" style=\"background:#fff;border:1px solid #E4DDD0;color:#6B6459;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit\">Скачать данные (JSON)<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ importData }}\" style=\"background:#fff;border:1px solid #E4DDD0;color:#6B6459;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit\">Загрузить данные<\u002Fbutton>\n            <\u002Fdiv>\n        <\u002Fdiv>\n    <\u002Fdiv>\n<\u002Fsc-if>\n\n<main id=\"top\">\n\n<section id=\"hero\" style=\"max-width:1180px;margin:0 auto;padding:clamp(48px,8vw,96px) 24px;display:grid;gap:44px;grid-template-columns:1.1fr 0.9fr;align-items:center\">\n  <div>\n    <span style=\"display:inline-block;background:#F3E4D9;color:#A6531F;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600\">Для детских садов и школ<\u002Fspan>\n    <h1 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:clamp(32px,4.6vw,54px);line-height:1.1;margin:18px 0 16px\">Расписание занятий, которое учитывает региональные требования — само<\u002Fh1>\n    <p style=\"font-size:18px;color:#6B6459;max-width:52ch;margin:0 0 28px\">Соберите сетку НОД для всех групп за вечер. Конструктор проверяет пересечения педагогов, нормы часов в неделю и ваши региональные требования — и сразу выгружает документ в Word для каждого педагога.<\u002Fp>\n    <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n      <a href=\"#tool\" style=\"background:#C1652E;color:#fff;padding:13px 22px;border-radius:11px;font-weight:600;font-size:15px\">Открыть конструктор<\u002Fa>\n      <a href=\"#how\" style=\"background:#fff;border:1px solid #E4DDD0;color:#2B2621;padding:13px 22px;border-radius:11px;font-weight:600;font-size:15px\">Как это работает<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#FFFFFF;border:1px solid #E4DDD0;border-radius:18px;padding:22px;box-shadow:0 20px 50px -25px rgba(43,38,33,.25)\">\n    <div style=\"font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6B7F5E;margin-bottom:12px\">Группа № 7 · Понедельник<\u002Fdiv>\n    <div style=\"display:grid;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:10px;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px\">\n        <span style=\"font-weight:700;font-size:13px;color:#2B2621;min-width:76px\">9.00–9.25<\u002Fspan>\n        <span style=\"background:#F3E4D9;color:#A6531F;border-radius:999px;padding:3px 10px;font-size:12.5px;font-weight:600\">Рисование<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px\">\n        <span style=\"font-weight:700;font-size:13px;color:#2B2621;min-width:76px\">9.35–10.00<\u002Fspan>\n        <span style=\"background:#EAEFE4;color:#6B7F5E;border-radius:999px;padding:3px 10px;font-size:12.5px;font-weight:600\">Музыка<\u002Fspan>\n        <span style=\"font-size:12.5px;color:#6B6459\">Муз. руководитель<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;border:1px solid #B3432E44;background:#FBEAE4;border-radius:10px;padding:9px 12px\">\n        <span style=\"font-weight:700;font-size:13px;color:#2B2621;min-width:76px\">10.10–10.35<\u002Fspan>\n        <span style=\"background:#fff;color:#B3432E;border-radius:999px;padding:3px 10px;font-size:12.5px;font-weight:600;border:1px solid #B3432E44\">Пересечение<\u002Fspan>\n        <span style=\"font-size:12.5px;color:#B3432E\">инструктор уже в группе № 4<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:14px;font-size:12.5px;color:#6B6459\">Конфликты подсвечиваются автоматически, ещё до печати расписания.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"how\" style=\"background:#FFFFFF;border-top:1px solid #E4DDD0;border-bottom:1px solid #E4DDD0\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:clamp(48px,7vw,80px) 24px\">\n    <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:clamp(26px,3vw,34px);margin:0 0 36px\">Как это работает<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px\">\n      <div>\n        <div style=\"font-family:'Newsreader',serif;font-size:26px;color:#C1652E;font-weight:600\">01<\u002Fdiv>\n        <div style=\"font-weight:700;margin:10px 0 6px\">Внесите группы и педагогов<\u002Fdiv>\n        <div style=\"font-size:14px;color:#6B6459\">Возрастные группы, предметы и педагоги — один раз, дальше конструктор помнит, кто что ведёт.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Newsreader',serif;font-size:26px;color:#C1652E;font-weight:600\">02<\u002Fdiv>\n        <div style=\"font-weight:700;margin:10px 0 6px\">Расставьте занятия по дням<\u002Fdiv>\n        <div style=\"font-size:14px;color:#6B6459\">Время, предмет, педагог — или чередование через неделю, если так принято у вас.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Newsreader',serif;font-size:26px;color:#C1652E;font-weight:600\">03<\u002Fdiv>\n        <div style=\"font-weight:700;margin:10px 0 6px\">Проверьте нормы и пересечения<\u002Fdiv>\n        <div style=\"font-size:14px;color:#6B6459\">Сервис сверит расписание с вашими нормами часов и региональными требованиями.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Newsreader',serif;font-size:26px;color:#C1652E;font-weight:600\">04<\u002Fdiv>\n        <div style=\"font-weight:700;margin:10px 0 6px\">Выгрузите расписание в Word<\u002Fdiv>\n        <div style=\"font-size:14px;color:#6B6459\">Каждому педагогу — свой файл .doc с его занятиями по всем группам.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"features\" style=\"max-width:1180px;margin:0 auto;padding:clamp(48px,7vw,80px) 24px\">\n  <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:clamp(26px,3vw,34px);margin:0 0 36px\">Что умеет конструктор<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px\">\n    <div style=\"border:1px solid #E4DDD0;border-radius:16px;padding:22px;background:#fff\">\n      <div style=\"font-weight:700;margin-bottom:8px\">Региональные требования<\u002Fdiv>\n      <div style=\"font-size:14px;color:#6B6459\">Задайте свои нормы часов и время окончания вариативных занятий — под требования своего региона и учреждения.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E4DDD0;border-radius:16px;padding:22px;background:#fff\">\n      <div style=\"font-weight:700;margin-bottom:8px\">Автопроверка пересечений<\u002Fdiv>\n      <div style=\"font-size:14px;color:#6B6459\">Если педагог назначен в двух группах одновременно — конструктор сразу покажет конфликт.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E4DDD0;border-radius:16px;padding:22px;background:#fff\">\n      <div style=\"font-weight:700;margin-bottom:8px\">Нормы часов в неделю<\u002Fdiv>\n      <div style=\"font-size:14px;color:#6B6459\">Укажите, сколько раз в неделю положено каждое занятие — сервис сверит факт с нормой.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E4DDD0;border-radius:16px;padding:22px;background:#fff\">\n      <div style=\"font-weight:700;margin-bottom:8px\">Чередование по неделям<\u002Fdiv>\n      <div style=\"font-size:14px;color:#6B6459\">Лепка ⇄ Аппликация и другие пары предметов, меняющиеся через неделю — в одном слоте сетки.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E4DDD0;border-radius:16px;padding:22px;background:#fff\">\n      <div style=\"font-weight:700;margin-bottom:8px\">Вариативные и инвариантные<\u002Fdiv>\n      <div style=\"font-size:14px;color:#6B6459\">Занятия со временем и занятия «в свободное время» — раздельно, как в реальной сетке НОД.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #E4DDD0;border-radius:16px;padding:22px;background:#fff\">\n      <div style=\"font-weight:700;margin-bottom:8px\">Экспорт в Word<\u002Fdiv>\n      <div style=\"font-size:14px;color:#6B6459\">Персональное расписание каждого педагога — одним кликом, в привычном .doc.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"tool\" style=\"background:#F0EBE1;border-top:1px solid #E4DDD0;border-bottom:1px solid #E4DDD0\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:clamp(48px,7vw,80px) 24px\">\n    <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:clamp(26px,3vw,34px);margin:0 0 10px\">Попробуйте конструктор прямо сейчас<\u002Fh2>\n    <p style=\"font-size:15px;color:#6B6459;margin:0 0 28px;max-width:60ch\">Это рабочий инструмент. Данные сохраняются в вашем браузере — ничего не отправляется на сервер.<\u002Fp>\n\n    <sc-if value=\"{{ ready }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#fff;border:1px solid #E4DDD0;border-radius:20px;box-shadow:0 30px 60px -35px rgba(43,38,33,.3)\">\n\n        <div class=\"tool-head\" style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:nowrap;background:#2B2621;padding:10px 16px;border-radius:19px 19px 0 0\">\n          <nav class=\"tool-tabs\" ref=\"{{ setTabsNavRef }}\" style=\"display:flex;gap:2px;flex:1;min-width:0\">\n            <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"6\">\n              <button sc-camel-on-click=\"{{ t.select }}\" data-tab-btn=\"{{ t.id }}\" class=\"tab-btn {{ t.stateCls }}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:9px 9px 0 0;background:transparent;color:#F7F4EE\" style-hover=\"background:rgba(255,255,255,.08)\">\n                <sc-if value=\"{{ t.active }}\"><span style=\"display:inline-flex;align-items:center;gap:6px;background:#F7F4EE;color:#2B2621;padding:9px 14px;margin:-9px -14px;border-radius:9px 9px 0 0\"><span class=\"tab-icon\">{{ t.icon }}<\u002Fspan><span class=\"tab-label\">{{ t.label }}<\u002Fspan><sc-if value=\"{{ t.showBadge }}\"><span style=\"background:#B3432E;color:#fff;border-radius:999px;font-size:10.5px;padding:1px 7px;font-weight:700\">{{ t.badge }}<\u002Fspan><\u002Fsc-if><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ t.activeFalse }}\"><span style=\"display:inline-flex;align-items:center;gap:6px\"><span class=\"tab-icon\">{{ t.icon }}<\u002Fspan><span class=\"tab-label\">{{ t.label }}<\u002Fspan><sc-if value=\"{{ t.showBadge }}\"><span style=\"background:#fff;color:#2B2621;border-radius:999px;font-size:10.5px;padding:1px 7px;font-weight:700\">{{ t.badge }}<\u002Fspan><\u002Fsc-if><\u002Fspan><\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fnav>\n          <button sc-camel-on-click=\"{{ openResetModal }}\" title=\"Сбросить всё\" class=\"reset-btn\" style=\"flex-shrink:0;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);border:none;color:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit\"><span class=\"reset-icon\" style=\"display:none;align-items:center\"><svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1 0 3-6.7L3 8\"><\u002Fpath><path d=\"M3 3v5h5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span class=\"reset-label\">Сбросить<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"tool-body\" style=\"padding:20px;background:#fff;border-radius:0 0 19px 19px\">\n\n        <sc-if value=\"{{ tabIsSchedule }}\">\n          <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px\">\n            <div style=\"flex:1 1 260px;min-width:220px;max-width:420px\"><dc-import name=\"CustomSelect\" options=\"{{ groupOptions }}\" value=\"{{ scheduleGid }}\" on-change=\"{{ onScheduleGidChange }}\" bold=\"{{ true }}\" hint-size=\"260px,42px\"><\u002Fdc-import><\u002Fdiv>\n            <div style=\"background:#F0EBE1;border-radius:999px;padding:3px;display:flex\">\n              <button sc-camel-on-click=\"{{ selectWeekA }}\" style=\"border:none;border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;background:{{ weekAbg }};color:{{ weekAcolor }}\">1-я неделя<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ selectWeekB }}\" style=\"border:none;border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;background:{{ weekBbg }};color:{{ weekBcolor }}\">2-я неделя<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"margin-left:auto;display:flex;gap:8px;align-items:center\">\n              <button sc-camel-on-click=\"{{ openScheduleExport }}\" aria-label=\"Выгрузить расписание\" title=\"Выгрузить\" style=\"background:#fff;border:1px solid #E4DDD0;color:#6B6459;border-radius:10px;width:36px;height:36px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0\" style-hover=\"border-color:#C1652E59;color:#A6531F;background:#F3E4D9\">\n                <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12\"><\u002Fpath><path d=\"m7 10 5 5 5-5\"><\u002Fpath><path d=\"M4 21h16\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <button sc-camel-on-click=\"{{ openScheduleImport }}\" aria-label=\"Загрузить расписание\" title=\"Загрузить\" style=\"background:#fff;border:1px solid #E4DDD0;color:#6B6459;border-radius:10px;width:36px;height:36px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0\" style-hover=\"border-color:#C1652E59;color:#A6531F;background:#F3E4D9\">\n                <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 15V3\"><\u002Fpath><path d=\"m7 8 5-5 5 5\"><\u002Fpath><path d=\"M4 21h16\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <button sc-camel-on-click=\"{{ generateSchedule }}\" style=\"background:#C1652E;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit\">Собрать расписание<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#6B6459;margin:-6px 0 14px\">Занятия распределяются по нормам недели автоматически и без пересечений педагогов. Чередующиеся занятия показывают предмет {{ weekOrdLabel }} недели — их можно скорректировать вручную.<\u002Fdiv>\n\n          <sc-if value=\"{{ scheduleNeedsSetup }}\">\n            <div style=\"border:1px dashed #E4DDD0;border-radius:14px;padding:22px;color:#6B6459;font-size:14px\">{{ scheduleSetupMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"display:grid;gap:12px\">\n            <sc-for list=\"{{ scheduleDays }}\" as=\"day\" hint-placeholder-count=\"5\">\n              <div style=\"border:1px solid #E4DDD0;border-radius:14px;overflow:hidden\">\n                <div style=\"background:#EAEFE4;padding:9px 14px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center\">\n                  <span>{{ day.name }}<\u002Fspan>\n                  <span style=\"font-size:12px;color:#6B6459;font-weight:500\">{{ day.countLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"padding:12px;display:grid;gap:8px\">\n                  <sc-for list=\"{{ day.lessons }}\" as=\"l\" hint-placeholder-count=\"2\">\n                    <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;border:1px solid {{ l.borderColor }};background:{{ l.bg }};border-radius:12px;padding:9px 12px\">\n                      <span style=\"font-variant-numeric:tabular-nums;font-weight:700;font-size:13.5px;color:#A6531F;min-width:92px\">{{ l.timeLabel }}<\u002Fspan>\n                      <span style=\"display:inline-flex;align-items:center;gap:6px;background:{{ l.chipBg }};color:{{ l.chipColor }};border-radius:999px;padding:3px 10px;font-size:12.5px;font-weight:600\">{{ l.chipLabel }}<\u002Fspan>\n                      <span style=\"font-size:12.5px;color:{{ l.teacherColor }}\">{{ l.teacherLabel }}<\u002Fspan>\n                      <button sc-camel-on-click=\"{{ l.del }}\" title=\"Удалить\" style=\"margin-left:auto;border:none;background:transparent;cursor:pointer;color:#6B6459;font-size:15px;font-family:inherit\">✕<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                  <sc-if value=\"{{ day.hasInv }}\">\n                    <div style=\"border-top:1px dashed #E4DDD0;padding-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center\">\n                      <span style=\"font-size:11px;color:#6B6459;font-weight:700;text-transform:uppercase;letter-spacing:.4px\">Инвариантные:<\u002Fspan>\n                      <sc-for list=\"{{ day.invariants }}\" as=\"iv\" hint-placeholder-count=\"1\">\n                        <span style=\"display:inline-flex;align-items:center;gap:6px;background:#EAEFE4;border:1px solid #E4DDD0;border-radius:999px;padding:4px 6px 4px 11px;font-size:12.5px\">\n                          {{ iv.label }}\n                          <button sc-camel-on-click=\"{{ iv.del }}\" style=\"border:none;background:transparent;cursor:pointer;color:#6B6459;font-family:inherit;padding:2px\">✕<\u002Fbutton>\n                        <\u002Fspan>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:2px\">\n                    <button sc-camel-on-click=\"{{ day.openVar }}\" style=\"background:transparent;border:1px solid #E4DDD0;color:#2B2621;border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit\">+ Занятие со временем<\u002Fbutton>\n                    <button sc-camel-on-click=\"{{ day.openInv }}\" style=\"background:transparent;border:1px solid #E4DDD0;color:#2B2621;border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit\">+ Инвариантное<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ tabIsChecks }}\">\n          <div style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px;margin-bottom:14px\">\n            <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n              <div style=\"font-weight:700;font-size:15px\">Автоматические проверки<\u002Fdiv>\n\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#6B6459;margin-top:6px\">Проверяются пересечения педагогов между группами, нормы недели и соответствие интервалам «Время занятий»: попадание в интервалы, лимиты «макс. занятий» и запрещённое время.<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ noIssues }}\">\n            <div style=\"border:1px solid #E4DDD0;border-radius:14px;padding:22px;display:flex;align-items:center;gap:12px\">\n              <div>\n                <div style=\"font-weight:700\">Конфликтов не найдено<\u002Fdiv>\n                <div style=\"font-size:13px;color:#6B6459\">Ни один педагог не пересекается между группами, нормы недели выполнены.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ hasErrors }}\">\n            <div style=\"border:1px solid #B3432E55;border-radius:14px;padding:16px;margin-bottom:14px\">\n              <div style=\"font-weight:700;color:#B3432E;margin-bottom:10px\">Нужно исправить ({{ errors.length }})<\u002Fdiv>\n              <div style=\"display:grid;gap:8px\">\n                <sc-for list=\"{{ errors }}\" as=\"e\" hint-placeholder-count=\"1\">\n                  <div style=\"background:#FBEAE4;border:1px solid #B3432E44;border-radius:10px;padding:9px 12px;font-size:13.5px\">{{ e.text }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ hasWarns }}\">\n            <div style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px\">\n              <div style=\"font-weight:700;color:#9C6B1F;margin-bottom:10px\">Предупреждения ({{ warns.length }})<\u002Fdiv>\n              <div style=\"display:grid;gap:8px\">\n                <sc-for list=\"{{ warns }}\" as=\"w\" hint-placeholder-count=\"1\">\n                  <div style=\"background:#FBEFD9;border:1px solid #9C6B1F55;border-radius:10px;padding:9px 12px;font-size:13.5px\">{{ w.text }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ tabIsNorms }}\">\n          <div style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px;margin-bottom:14px\">\n            <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n              <div style=\"font-weight:700;font-size:15px\">Нормы занятий в неделю<\u002Fdiv>\n              <div style=\"flex:1 1 260px;min-width:220px;max-width:420px\"><dc-import name=\"CustomSelect\" options=\"{{ groupOptions }}\" value=\"{{ normsGid }}\" on-change=\"{{ onNormsGidChange }}\" hint-size=\"260px,40px\"><\u002Fdc-import><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ normsNoSubjects }}\"><div style=\"color:#6B6459;font-size:13.5px;margin-top:14px\">{{ normsNoSubjectsMsg }}<\u002Fdiv><\u002Fsc-if>\n            <div style=\"display:grid;gap:8px;margin-top:14px\">\n              <sc-for list=\"{{ normSubjectRows }}\" as=\"n\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border:1px solid #E4DDD0;border-radius:12px;padding:8px 12px\">\n                  <span style=\"display:inline-flex;align-items:center;box-sizing:border-box;min-height:34px;font-size:13px;font-weight:600;border-radius:14px;padding:6px 12px;border:1.5px solid {{ n.borderColor }};background:{{ n.bg }};color:{{ n.color }}\">{{ n.label }}<\u002Fspan>\n                  <div class=\"norm-controls\" style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;min-width:0;max-width:100%\">\n                    <div class=\"seg-toggle\" style=\"display:inline-flex;border:1px solid #E4DDD0;border-radius:999px;overflow:hidden\">\n                      <button sc-camel-on-click=\"{{ n.setMain }}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 12px;background:{{ n.mainBg }};color:{{ n.mainColor }}\">основное<\u002Fbutton>\n                      <button sc-camel-on-click=\"{{ n.setExtra }}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 12px;background:{{ n.extraBg }};color:{{ n.extraColor }}\">дополнительное<\u002Fbutton>\n                      <button sc-camel-on-click=\"{{ n.setOther }}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 12px;background:{{ n.otherBg }};color:{{ n.otherColor }}\">иное<\u002Fbutton>\n                    <\u002Fdiv>\n                    <input type=\"number\" min=\"0\" max=\"10\" value=\"{{ n.perWeek }}\" sc-camel-on-change=\"{{ n.onPerWeekChange }}\" style=\"width:64px;text-align:center;border:1px solid #E4DDD0;border-radius:10px;padding:8px 6px;font-family:inherit;font-size:14px\">\n                    <span style=\"font-size:13px;color:#6B6459\">в неделю<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ tabIsTiming }}\">\n          <sc-if value=\"{{ timingsEmpty }}\">\n            <div style=\"border:1px dashed #E4DDD0;border-radius:14px;padding:16px;margin-bottom:12px\">\n              <div style=\"font-weight:700;font-size:15px;margin-bottom:4px\">Время занятий<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6B6459;margin-bottom:8px\">Начало, продолжительность и перерывы занятий для выбранных групп<\u002Fdiv>\n              <div style=\"color:#6B6459;font-size:13.5px\">Времён занятий пока нет — добавьте первое ниже. Без них расписание собирается по умолчанию: с 9.00, занятие 25 мин, перерыв 10 мин, до 11.00.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-for list=\"{{ timingsList }}\" as=\"tm\" hint-placeholder-count=\"2\">\n            <div class=\"timing-card\" style=\"position:relative;border:1px solid {{ tm.rowBorder }};border-radius:14px;padding:16px 76px 16px 16px;margin-bottom:12px\">\n              <div class=\"tm-head\">\n                <span style=\"font-weight:700;font-size:15px;color:#2B2621;margin-right:8px\">{{ tm.name }}<\u002Fspan>\n                <span style=\"color:#6B6459;font-size:13px\">{{ tm.summary }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ tm.hasGroups }}\">\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:8px\">\n                  <sc-for list=\"{{ tm.groupTags }}\" as=\"c\" hint-placeholder-count=\"2\">\n                    <span style=\"display:inline-flex;align-items:center;font-size:13px;font-weight:600;border-radius:14px;padding:5px 11px;border:1px solid #E4DDD0;background:#F7F4EE;color:#2B2621\">{{ c.label }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ tm.noGroups }}\"><div style=\"font-size:12.5px;color:#6B6459;margin-top:8px\">Группы не выбраны<\u002Fdiv><\u002Fsc-if>\n              <div style=\"position:absolute;top:14px;right:14px;display:flex;gap:6px;align-items:center\">\n                <button sc-camel-on-click=\"{{ tm.startEdit }}\" title=\"Редактировать\" style=\"border:none;background:transparent;cursor:pointer;color:{{ tm.editColor }};padding:2px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;transform:{{ tm.editScale }};transition:transform .15s,color .15s\" sc-camel-on-mouse-enter=\"{{ tm.editHoverEnter }}\" sc-camel-on-mouse-leave=\"{{ tm.editHoverLeave }}\">\n                  <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n                <button sc-camel-on-click=\"{{ tm.del }}\" title=\"Удалить\" style=\"border:none;background:transparent;cursor:pointer;color:{{ tm.delColor }};padding:2px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;transform:{{ tm.delScale }};transition:transform .15s,color .15s\" sc-camel-on-mouse-enter=\"{{ tm.delHoverEnter }}\" sc-camel-on-mouse-leave=\"{{ tm.delHoverLeave }}\">\n                  <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6L6 18\"><\u002Fpath><path d=\"M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px\">\n            <div style=\"margin-bottom:10px\">\n              <div style=\"font-weight:700;font-size:15px\">{{ timingFormTitle }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px\">\n              <input ref=\"{{ setTimingNameInputRef }}\" placeholder=\"Например, «Младшие группы»\" value=\"{{ newTimingName }}\" sc-camel-on-change=\"{{ onNewTimingNameChange }}\" style=\"flex:1 1 240px;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px;font-family:inherit\">\n              <button sc-camel-on-click=\"{{ addTiming }}\" style=\"background:{{ timingAddBg }};color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">{{ timingAddLabel }}<\u002Fbutton>\n              <sc-if value=\"{{ isEditingTiming }}\"><button sc-camel-on-click=\"{{ cancelEditTiming }}\" style=\"background:#B3432E;border:none;color:#fff;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">Отмена<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n            <sc-if value=\"{{ showTimingFields }}\">\n              <div style=\"display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap\">\n                <label style=\"font-size:12.5px;color:#6B6459;flex:0 0 90px\">Занятие, мин\n                  <input ref=\"{{ lessonMinRef }}\" type=\"number\" min=\"5\" max=\"120\" value=\"{{ newTimingLesson }}\" sc-camel-on-change=\"{{ onNewTimingLessonChange }}\" sc-camel-on-blur=\"{{ onNewTimingLessonBlur }}\" sc-camel-on-key-down=\"{{ onNewTimingLessonKeyDown }}\" style=\"display:block;width:100%;box-sizing:border-box;margin-top:4px;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px;font-family:inherit;font-size:14px\">\n                <\u002Flabel>\n                <span style=\"color:#6B6459;visibility:hidden;padding:9px 0;width:12px;text-align:center;flex:0 0 12px\">–<\u002Fspan>\n                <label style=\"font-size:12.5px;color:#6B6459;flex:0 0 90px\">Перерыв, мин\n                  <input ref=\"{{ breakMinRef }}\" type=\"number\" min=\"0\" max=\"120\" value=\"{{ newTimingBreak }}\" sc-camel-on-change=\"{{ onNewTimingBreakChange }}\" sc-camel-on-blur=\"{{ onNewTimingBreakBlur }}\" sc-camel-on-key-down=\"{{ onNewTimingBreakKeyDown }}\" style=\"display:block;width:100%;box-sizing:border-box;margin-top:4px;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px;font-family:inherit;font-size:14px\">\n                <\u002Flabel>\n              <\u002Fdiv>\n              <sc-for list=\"{{ newTimingBlockSections }}\" as=\"sec\" hint-placeholder-count=\"4\">\n                <div style=\"margin-top:14px\">\n                  <div style=\"font-size:12.5px;color:#6B6459;margin-bottom:6px\">{{ sec.label }}<\u002Fdiv>\n                  <sc-for list=\"{{ sec.rows }}\" as=\"w\" hint-placeholder-count=\"1\">\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\">\n                      <input ref=\"{{ w.startRef }}\" value=\"{{ w.start }}\" sc-camel-on-change=\"{{ w.onStartChange }}\" sc-camel-on-blur=\"{{ w.onStartBlur }}\" sc-camel-on-key-down=\"{{ w.onStartKeyDown }}\" placeholder=\"09:00\" sc-camel-input-mode=\"numeric\" sc-camel-max-length=\"5\" style=\"width:90px;box-sizing:border-box;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px;font-family:inherit;font-size:14px\">\n                      <span style=\"color:#6B6459;width:12px;text-align:center;flex:0 0 12px\">–<\u002Fspan>\n                      <input ref=\"{{ w.endRef }}\" value=\"{{ w.end }}\" sc-camel-on-change=\"{{ w.onEndChange }}\" sc-camel-on-blur=\"{{ w.onEndBlur }}\" sc-camel-on-key-down=\"{{ w.onEndKeyDown }}\" placeholder=\"11:00\" sc-camel-input-mode=\"numeric\" sc-camel-max-length=\"5\" style=\"width:90px;box-sizing:border-box;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px;font-family:inherit;font-size:14px\">\n                      <sc-if value=\"{{ w.hasMax }}\" hint-placeholder-val=\"{{ true }}\"><input ref=\"{{ w.maxRef }}\" value=\"{{ w.max }}\" sc-camel-on-change=\"{{ w.onMaxChange }}\" sc-camel-on-key-down=\"{{ w.onMaxKeyDown }}\" placeholder=\"макс. занятий\" sc-camel-input-mode=\"numeric\" sc-camel-max-length=\"2\" title=\"Максимум занятий в этот интервал за день. Пусто — без ограничения\" style=\"width:118px;box-sizing:border-box;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px;font-family:inherit;font-size:14px\"><\u002Fsc-if>\n                      <button sc-camel-on-click=\"{{ w.remove }}\" title=\"Удалить интервал\" style=\"border:none;background:transparent;cursor:pointer;color:{{ w.delColor }};padding:2px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;transform:{{ w.delScale }};transition:transform .15s,color .15s\" sc-camel-on-mouse-enter=\"{{ w.delHoverEnter }}\" sc-camel-on-mouse-leave=\"{{ w.delHoverLeave }}\">\n                        <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6L6 18\"><\u002Fpath><path d=\"M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n                      <\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                  <button sc-camel-on-click=\"{{ sec.add }}\" style=\"box-sizing:border-box;width:208px;border:1px dashed #E4DDD0;background:#fff;color:#6B6459;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit\">+ Добавить интервал<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"font-size:12.5px;color:#6B6459;margin-top:12px\">«Время проведения всех занятий» — общий интервал: его «макс» ограничивает любые занятия в этом времени. Основные занятия ставятся в интервалы «Занятия», дополнительные — в «Доп. занятия», иные — в «Иные занятия». «Нельзя проводить занятия» — время, куда конструктор ничего не поставит (действует и внутри «Все занятия»).<\u002Fdiv>\n              <div style=\"margin-top:12px\">\n                <div style=\"font-size:12.5px;color:#6B6459;margin-bottom:6px\">Для групп:<\u002Fdiv>\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n                  <sc-for list=\"{{ newTimingGroupChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n                    <button sc-camel-on-click=\"{{ c.toggle }}\" style=\"display:inline-flex;align-items:center;box-sizing:border-box;min-height:34px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;border-radius:999px;padding:6px 12px;border:1.5px solid {{ c.borderColor }};background:{{ c.bg }};color:{{ c.color }}\">{{ c.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6B6459;margin-top:12px\">Время — в формате 9.00 или 09:00. Если занятия не помещаются до времени завершения, конструктор всё равно расставит их, а вкладка «Проверки» подсветит проблемы.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ tabIsTeachers }}\">\n          <sc-if value=\"{{ teachersEmpty }}\">\n            <div style=\"border:1px dashed #E4DDD0;border-radius:14px;padding:16px;margin-bottom:12px\">\n              <div style=\"font-weight:700;font-size:15px;margin-bottom:4px\">Педагог<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6B6459;margin-bottom:8px\">Ответственный преподаватель по предметам<\u002Fdiv>\n              <div style=\"color:#6B6459;font-size:13.5px\">Педагогов пока нет — добавьте первого ниже.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-for list=\"{{ teachersList }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px;margin-bottom:12px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap\">\n                <div style=\"flex:1 1 260px;font-weight:700;font-size:15px;color:#2B2621\">{{ t.name }}<\u002Fdiv>\n                <div style=\"display:flex;gap:8px;align-items:center\">\n                  <button sc-camel-on-click=\"{{ t.startEdit }}\" title=\"Редактировать педагога\" style=\"border:none;background:transparent;cursor:pointer;color:{{ t.editIconColor }};padding:2px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;transform:{{ t.editIconScale }};transition:transform .15s,color .15s\" sc-camel-on-mouse-enter=\"{{ t.editHoverEnter }}\" sc-camel-on-mouse-leave=\"{{ t.editHoverLeave }}\">\n                    <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ t.exportWord }}\" style=\"background:#EAEFE4;color:#6B7F5E;border:1px solid #6B7F5E44;border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit\">Скачать в Word<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ t.del }}\" style=\"background:transparent;color:#B3432E;border:1px solid #E4DDD0;border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit\">Удалить<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6B6459;margin-top:8px\">График работы: <span style=\"color:#2B2621;font-weight:600\">{{ t.workLabel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6B6459;margin:8px 0 6px\">Ведёт предметы:<\u002Fdiv>\n              <sc-if value=\"{{ t.noSubjects }}\"><div style=\"font-size:12.5px;color:#6B6459\">— не назначены —<\u002Fdiv><\u002Fsc-if>\n              <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n                <sc-for list=\"{{ t.subjectTags }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <span style=\"display:inline-flex;align-items:center;box-sizing:border-box;min-height:34px;font-size:13px;font-weight:600;border-radius:999px;padding:6px 12px;border:1.5px solid {{ c.borderColor }};background:{{ c.bg }};color:{{ c.color }}\">{{ c.label }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px\">\n            <div style=\"margin-bottom:10px\">\n              <div style=\"font-weight:700;font-size:15px\">{{ teacherFormTitle }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n              <input ref=\"{{ setTeacherNameInputRef }}\" placeholder=\"Фамилия И.О. должность\" value=\"{{ newTeacherName }}\" sc-camel-on-change=\"{{ onNewTeacherNameChange }}\" sc-camel-on-key-down=\"{{ onNewTeacherNameKeyDown }}\" style=\"flex:1 1 220px;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px;font-family:inherit\">\n              <button sc-camel-on-click=\"{{ addTeacher }}\" style=\"background:{{ teacherAddBg }};color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">{{ teacherAddLabel }}<\u002Fbutton>\n              <sc-if value=\"{{ isEditingTeacher }}\"><button sc-camel-on-click=\"{{ cancelEditTeacher }}\" style=\"background:#B3432E;border:none;color:#fff;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">Отмена<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n            <sc-if value=\"{{ showNewTeacherSubjects }}\">\n              <div style=\"margin-top:12px\">\n                <div style=\"font-size:12.5px;color:#6B6459;margin-bottom:6px\">Выберете предметы:<\u002Fdiv>\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n                  <sc-for list=\"{{ newTeacherSubjectChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n                    <button sc-camel-on-click=\"{{ c.toggle }}\" style=\"display:inline-flex;align-items:center;box-sizing:border-box;min-height:34px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;border-radius:999px;padding:6px 12px;border:1.5px solid {{ c.borderColor }};background:{{ c.bg }};color:{{ c.color }}\">{{ c.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:14px\">\n                <div style=\"font-size:12.5px;color:#6B6459;margin-bottom:6px\">Дни и часы работы (если не указать — без ограничений):<\u002Fdiv>\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n                  <sc-for list=\"{{ teacherDayChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n                    <button sc-camel-on-click=\"{{ c.toggle }}\" style=\"display:inline-flex;align-items:center;box-sizing:border-box;min-height:34px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;border-radius:999px;padding:6px 14px;border:1.5px solid {{ c.borderColor }};background:{{ c.bg }};color:{{ c.color }}\">{{ c.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <sc-for list=\"{{ teacherDayHours }}\" as=\"h\" hint-placeholder-count=\"0\">\n                  <div style=\"display:flex;gap:8px;align-items:center;margin-top:8px\">\n                    <span style=\"width:30px;font-size:13px;font-weight:700;color:#2B2621\">{{ h.label }}<\u002Fspan>\n                    <input value=\"{{ h.start }}\" sc-camel-on-change=\"{{ h.onStartChange }}\" sc-camel-on-blur=\"{{ h.onStartBlur }}\" placeholder=\"08:00\" sc-camel-input-mode=\"numeric\" style=\"width:72px;box-sizing:border-box;border:1px solid #E4DDD0;border-radius:10px;padding:8px 10px;font-family:inherit;font-size:14px;text-align:center\">\n                    <span style=\"color:#6B6459\">—<\u002Fspan>\n                    <input value=\"{{ h.end }}\" sc-camel-on-change=\"{{ h.onEndChange }}\" sc-camel-on-blur=\"{{ h.onEndBlur }}\" placeholder=\"17:00\" sc-camel-input-mode=\"numeric\" style=\"width:72px;box-sizing:border-box;border:1px solid #E4DDD0;border-radius:10px;padding:8px 10px;font- -content:center;transform:{{ g.delScale }};transition:transform .15s,color .15s\" sc-camel-on-mouse-enter=\"{{ g.delHoverEnter }}\" sc-camel-on-mouse-leave=\"{{ g.delHoverLeave }}\">\n                  <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6L6 18\"><\u002Fpath><path d=\"M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6B6459;margin:10px 0 6px\">Изучают предметы:<\u002Fdiv>\n              <sc-if value=\"{{ g.noSubjects }}\"><div style=\"font-size:12.5px;color:#6B6459\">— не назначены —<\u002Fdiv><\u002Fsc-if>\n              <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n                <sc-for list=\"{{ g.subjectTags }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <span title=\"{{ c.teacherLabel }}\" style=\"display:inline-flex;align-items:center;box-sizing:border-box;min-height:34px;font-size:13px;font-weight:600;border-radius:999px;padding:6px 12px;border:1.5px solid {{ c.borderColor }};background:{{ c.bg }};color:{{ c.color }}\">{{ c.label }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"border:1px solid #E4DDD0;border-radius:14px;padding:16px\">\n            <div style=\"margin-bottom:10px\">\n              <div style=\"font-weight:700;font-size:15px\">{{ groupFormTitle }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n              <input ref=\"{{ setGroupNameInputRef }}\" placeholder=\"№ 12\" value=\"{{ newGroupName }}\" sc-camel-on-change=\"{{ onNewGroupNameChange }}\" sc-camel-on-key-down=\"{{ onNewGroupNameKeyDown }}\" style=\"flex:1 1 160px;border:1px solid #E4DDD0;border-radius:10px;padding:9px 12px;font-family:inherit\">\n              <d
